{% include 'store/base.html' %}
{% load static %}
{% load crispy_forms_tags %}
{% block content %}

<style>     
    body{
        background-color: grey;
    }
</style>

    <body>
        <br>
        <div class="container bg-white shadow-md p-5 form-layout">
            <h3> Delete your account </h3>
            <hr>
            <p> Are you sure that you want to delete your account? </p>
            <br>
            <form action="" method="POST" autocomplete="off">
                {% csrf_token %}
                
                <button type="submit" class="btn btn-danger navbar-btn text-white"> &nbsp; Delete your account </button>
                <br><br>
                <a class="btn btn-primary navbar-btn text-white" type="button"  href="{% url 'profile-management' %}"> Go back </a>
            </form>
        </div>
    </body>
<br><br>
{% endblock %}
